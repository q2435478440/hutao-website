<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
:root {
  --cream: #FFFBF5; --cream-warm: #FFF8ED; --peach: #FFF0E5;
  --text-primary: #3D3226; --text-secondary: #8B7E6E; --text-muted: #B8A99A;
  --r-red: #FF6B6B; --r-orange: #FFA94D; --r-yellow: #FFD43B;
  --r-green: #69DB7C; --r-blue: #74C0FC; --r-purple: #B197FC; --r-pink: #F783AC;
  --card-bg: #FFFFFF; --card-shadow: 0 2px 16px rgba(0,0,0,0.04), 0 0 0 1px rgba(0,0,0,0.03);
  --card-shadow-hover: 0 8px 32px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.05);
  --radius-sm: 10px; --radius-md: 18px; --radius-lg: 28px; --radius-full: 9999px;
  --font-display: 'ZCOOL KuaiLe', 'Noto Sans SC', sans-serif;
  --font-body: 'Noto Sans SC', -apple-system, sans-serif;
  --ease-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
  --ease-smooth: cubic-bezier(0.22, 0.61, 0.36, 1);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html{scroll-behavior:smooth;scroll-padding-top:80px}
body{background:var(--cream);color:var(--text-primary);font-family:var(--font-body);font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:-1;background:radial-gradient(ellipse 600px 400px at 20% 10%,rgba(255,107,107,0.06) 0%,transparent 70%),radial-gradient(ellipse 500px 500px at 80% 30%,rgba(255,169,77,0.05) 0%,transparent 70%),radial-gradient(ellipse 400px 300px at 50% 60%,rgba(116,192,252,0.04) 0%,transparent 70%),radial-gradient(ellipse 500px 400px at 10% 80%,rgba(177,151,252,0.05) 0%,transparent 70%);pointer-events:none}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:var(--cream-warm)}
::-webkit-scrollbar-thumb{background:linear-gradient(180deg,var(--r-red),var(--r-orange),var(--r-yellow),var(--r-green),var(--r-blue),var(--r-purple));border-radius:4px}
::selection{background:rgba(255,169,77,0.3);color:var(--text-primary)}
.nav{position:fixed;top:0;left:0;right:0;z-index:100;padding:14px 32px;display:flex;justify-content:space-between;align-items:center;transition:all 0.4s var(--ease-smooth)}
.nav.scrolled{background:rgba(255,251,245,0.85);backdrop-filter:blur(20px) saturate(1.5);-webkit-backdrop-filter:blur(20px) saturate(1.5);padding:10px 32px;box-shadow:0 1px 0 rgba(0,0,0,0.04)}
.nav-logo{font-family:var(--font-display);font-size:1.35rem;color:var(--text-primary);text-decoration:none;display:flex;align-items:center;gap:6px;transition:transform 0.3s var(--ease-bounce)}
.nav-logo:hover{transform:scale(1.05)}
.logo-emoji{display:inline-block;animation:rainbowPulse 3s ease-in-out infinite}
@keyframes rainbowPulse{0%,100%{filter:hue-rotate(0deg)}50%{filter:hue-rotate(30deg)}}
.nav-links{display:flex;gap:32px;list-style:none;align-items:center}
.nav-links a{font-size:0.9rem;font-weight:500;color:var(--text-secondary);text-decoration:none;padding:6px 0;position:relative;transition:color 0.3s ease}
.nav-links a::after{content:'';position:absolute;bottom:0;left:0;width:0;height:2.5px;border-radius:2px;background:linear-gradient(90deg,var(--r-red),var(--r-orange),var(--r-yellow));transition:width 0.3s var(--ease-bounce)}
.nav-links a:hover{color:var(--text-primary)}
.nav-links a:hover::after{width:100%}
.nav-links a.nav-active{color:var(--text-primary)}
.nav-links a.nav-active::after{width:100%}
.nav-toggle{display:none;flex-direction:column;gap:5px;background:none;border:none;cursor:pointer;padding:4px;z-index:101}
.nav-toggle span{display:block;width:22px;height:2.5px;border-radius:2px;background:var(--text-primary);transition:all 0.3s var(--ease-smooth)}
.nav-toggle.active span:nth-child(1){transform:rotate(45deg) translate(5px,5px)}
.nav-toggle.active span:nth-child(2){opacity:0}
.nav-toggle.active span:nth-child(3){transform:rotate(-45deg) translate(5px,-5px)}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:100px 20px;position:relative;overflow:hidden}
.hero-rainbow-orb{position:absolute;border-radius:50%;filter:blur(80px);opacity:0.15;animation:orbFloat 8s ease-in-out infinite;pointer-events:none}
.hero-rainbow-orb:nth-child(1){width:300px;height:300px;background:var(--r-pink);top:10%;left:-5%}
.hero-rainbow-orb:nth-child(2){width:250px;height:250px;background:var(--r-blue);top:40%;right:-5%;animation-delay:-3s}
.hero-rainbow-orb:nth-child(3){width:200px;height:200px;background:var(--r-yellow);bottom:15%;left:30%;animation-delay:-5s}
.hero-rainbow-orb:nth-child(4){width:180px;height:180px;background:var(--r-green);top:60%;left:-3%;animation-delay:-7s}
@keyframes orbFloat{0%,100%{transform:translate(0,0) scale(1)}25%{transform:translate(30px,-20px) scale(1.1)}50%{transform:translate(-20px,15px) scale(0.95)}75%{transform:translate(15px,25px) scale(1.05)}}
.hero-float-emoji{position:absolute;font-size:2rem;pointer-events:none;animation:floatEmoji 6s ease-in-out infinite;opacity:0.5}
.hero-float-emoji:nth-child(5){top:15%;left:10%}
.hero-float-emoji:nth-child(6){top:25%;right:12%;animation-delay:-2s;font-size:1.5rem}
.hero-float-emoji:nth-child(7){bottom:25%;left:8%;animation-delay:-4s;font-size:1.8rem}
.hero-float-emoji:nth-child(8){bottom:20%;right:15%;animation-delay:-1s}
@keyframes floatEmoji{0%,100%{transform:translateY(0) rotate(0deg)}33%{transform:translateY(-15px) rotate(5deg)}66%{transform:translateY(8px) rotate(-3deg)}}
.hero-content{position:relative;z-index:2}
.hero-avatar{width:100px;height:100px;border-radius:50%;background:linear-gradient(135deg,var(--r-pink),var(--r-orange),var(--r-yellow));display:flex;align-items:center;justify-content:center;margin:0 auto 32px;font-size:3rem;box-shadow:0 8px 32px rgba(247,131,172,0.25);animation:avatarBounce 3s var(--ease-bounce) infinite}
@keyframes avatarBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
.hero-name{font-family:var(--font-display);font-size:clamp(2.5rem,7vw,4.5rem);color:var(--text-primary);margin-bottom:12px;line-height:1.2}
.rainbow-text{background:linear-gradient(90deg,var(--r-red),var(--r-orange),var(--r-yellow),var(--r-green),var(--r-blue),var(--r-purple),var(--r-pink));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;background-size:200% auto;animation:rainbowShift 4s linear infinite}
@keyframes rainbowShift{0%{background-position:0% center}100%{background-position:200% center}}
.hero-tagline{font-size:clamp(1rem,2.5vw,1.15rem);color:var(--text-secondary);font-weight:400;max-width:480px;margin:0 auto 20px;line-height:1.8}
.hero-bio{font-size:0.95rem;color:var(--text-muted);max-width:420px;margin:0 auto 32px;line-height:1.9}
.hero-stats-row{display:flex;gap:32px;justify-content:center;flex-wrap:wrap;margin-bottom:32px}
.hero-stat{text-align:center;padding:12px 20px;background:var(--card-bg);border-radius:var(--radius-md);box-shadow:var(--card-shadow)}
.hero-stat-value{font-family:var(--font-display);font-size:1.3rem;color:var(--r-orange)}
.hero-stat-label{font-size:0.75rem;color:var(--text-muted);margin-top:2px}
.hero-scroll{position:absolute;bottom:32px;left:50%;transform:translateX(-50%);display:flex;flex-direction:column;align-items:center;gap:6px;opacity:0.5;animation:scrollHint 2s ease-in-out infinite}
@keyframes scrollHint{0%,100%{opacity:0.3;transform:translateX(-50%) translateY(0)}50%{opacity:0.7;transform:translateX(-50%) translateY(6px)}}
.hero-scroll span{font-size:0.7rem;color:var(--text-muted);letter-spacing:0.1em}
.hero-scroll-line{width:1.5px;height:32px;background:linear-gradient(to bottom,var(--r-orange),transparent);border-radius:1px}
.section{padding:100px 20px;max-width:1100px;margin:0 auto}
.section-header{text-align:center;margin-bottom:48px}
.section-emoji{font-size:2.5rem;margin-bottom:12px;display:block}
.section-title{font-family:var(--font-display);font-size:clamp(1.8rem,4vw,2.5rem);color:var(--text-primary);margin-bottom:12px;line-height:1.3}
.section-desc{font-size:0.95rem;color:var(--text-secondary);max-width:500px;margin:0 auto;line-height:1.7}
.rainbow-divider{width:60px;height:4px;border-radius:2px;background:linear-gradient(90deg,var(--r-red),var(--r-orange),var(--r-yellow),var(--r-green),var(--r-blue),var(--r-purple));margin:0 auto 32px}
.filter-bar{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:32px}
.filter-btn{padding:8px 18px;border:none;background:var(--card-bg);color:var(--text-secondary);font-family:var(--font-body);font-size:0.85rem;font-weight:500;border-radius:var(--radius-full);cursor:pointer;transition:all 0.3s var(--ease-bounce);box-shadow:var(--card-shadow)}
.filter-btn:hover{transform:translateY(-2px);box-shadow:var(--card-shadow-hover)}
.filter-btn.active{background:linear-gradient(135deg,var(--r-orange),var(--r-pink));color:#fff;box-shadow:0 4px 16px rgba(255,169,77,0.3)}
.lookbook-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:20px}
.look-card{position:relative;border-radius:var(--radius-lg);overflow:hidden;background:var(--card-bg);box-shadow:var(--card-shadow);cursor:pointer;transition:all 0.4s var(--ease-smooth);aspect-ratio:3/4}
.look-card:hover{transform:translateY(-6px);box-shadow:var(--card-shadow-hover)}
.look-card-image{width:100%;height:100%;object-fit:cover;transition:transform 0.6s var(--ease-smooth)}
.look-card:hover .look-card-image{transform:scale(1.05)}
.look-card-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,0.5) 0%,rgba(0,0,0,0.05) 40%,transparent 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:20px;opacity:0;transition:opacity 0.3s ease}
.look-card:hover .look-card-overlay{opacity:1}
.look-card-title{font-family:var(--font-display);font-size:1.1rem;color:#fff;margin-bottom:4px}
.look-card-desc{font-size:0.8rem;color:rgba(255,255,255,0.85);line-height:1.5}
.look-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:8px}
.look-card-tag{padding:3px 10px;background:rgba(255,255,255,0.2);backdrop-filter:blur(4px);border-radius:var(--radius-full);font-size:0.7rem;color:#fff}
.look-card-badge{position:absolute;top:12px;left:12px;padding:5px 12px;background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);border-radius:var(--radius-full);font-size:0.7rem;font-weight:500;color:var(--text-primary);box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.look-card-video{width:100%;height:100%;object-fit:cover;transition:transform 0.6s var(--ease-smooth)}
.look-card:hover .look-card-video{transform:scale(1.05)}
.look-card-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:3rem;color:rgba(255,255,255,0.5);transition:transform 0.6s var(--ease-smooth)}
.look-card:hover .look-card-placeholder{transform:scale(1.05)}
.look-play-btn{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:48px;height:48px;border-radius:50%;background:rgba(255,255,255,0.9);display:flex;align-items:center;justify-content:center;font-size:1.1rem;color:var(--text-primary);pointer-events:none;z-index:3;opacity:0;transition:opacity 0.3s ease}
.look-card:hover .look-play-btn,.look-card[data-video="true"] .look-play-btn{opacity:1}
.look-card-overlay-video{background:linear-gradient(to top,rgba(0,0,0,0.55) 0%,rgba(0,0,0,0.1) 50%,transparent 100%)}
.travel-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:20px}
.travel-card{position:relative;border-radius:var(--radius-lg);overflow:hidden;background:var(--card-bg);box-shadow:var(--card-shadow);transition:all 0.4s var(--ease-smooth)}
.travel-card:hover{transform:translateY(-4px);box-shadow:var(--card-shadow-hover)}
.travel-card-image-wrap{position:relative;width:100%;aspect-ratio:4/3;overflow:hidden}
.travel-card-image{width:100%;height:100%;object-fit:cover;transition:transform 0.6s var(--ease-smooth)}
.travel-card:hover .travel-card-image{transform:scale(1.05)}
.travel-card-placeholder{width:100%;height:100%;display:flex;align-items:center;justify-content:center;font-family:var(--font-display);font-size:2.5rem;color:rgba(255,255,255,0.45);transition:transform 0.6s var(--ease-smooth)}
.travel-card:hover .travel-card-placeholder{transform:scale(1.05)}
.travel-card-location{position:absolute;top:12px;left:12px;padding:5px 12px;background:rgba(255,255,255,0.9);backdrop-filter:blur(8px);border-radius:var(--radius-full);font-size:0.75rem;font-weight:500;color:var(--text-primary);display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,0.08)}
.travel-card-body{padding:20px}
.travel-card-title{font-family:var(--font-display);font-size:1.05rem;color:var(--text-primary);margin-bottom:6px}
.travel-card-date{font-size:0.75rem;color:var(--text-muted);margin-bottom:8px}
.travel-card-desc{font-size:0.85rem;color:var(--text-secondary);line-height:1.6}
.travel-card-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:12px}
.travel-card-tag{padding:3px 10px;background:var(--peach);border-radius:var(--radius-full);font-size:0.7rem;color:var(--r-orange);font-weight:500}
.stats-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:20px;margin-bottom:48px}
.stat-card{background:var(--card-bg);border-radius:var(--radius-lg);padding:32px;text-align:center;box-shadow:var(--card-shadow);transition:all 0.3s var(--ease-smooth);position:relative;overflow:hidden}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;border-radius:0 0 3px 3px}
.stat-card:nth-child(1)::before{background:var(--r-red)}
.stat-card:nth-child(2)::before{background:var(--r-orange)}
.stat-card:nth-child(3)::before{background:var(--r-yellow)}
.stat-card:nth-child(4)::before{background:var(--r-green)}
.stat-card:nth-child(5)::before{background:var(--r-blue)}
.stat-card:hover{transform:translateY(-4px);box-shadow:var(--card-shadow-hover)}
.stat-card-icon{font-size:2rem;margin-bottom:12px}
.stat-card-platform{font-family:var(--font-display);font-size:1.1rem;color:var(--text-primary);margin-bottom:12px}
.stat-card-value{font-size:1.6rem;font-weight:700;color:var(--text-primary);margin-bottom:2px}
.stat-card-label{font-size:0.75rem;color:var(--text-muted)}
.stat-detail-row{display:flex;justify-content:center;gap:32px;flex-wrap:wrap;margin-top:12px}
.stat-detail{text-align:center}
.stat-detail-val{font-weight:600;color:var(--text-primary);font-size:0.9rem}
.stat-detail-lbl{font-size:0.7rem;color:var(--text-muted)}
.brands-section{margin-top:48px}
.brands-title{font-family:var(--font-display);font-size:1.3rem;text-align:center;color:var(--text-primary);margin-bottom:20px}
.brands-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center}
.brand-tag{padding:8px 18px;background:var(--card-bg);border-radius:var(--radius-full);font-size:0.85rem;color:var(--text-secondary);box-shadow:var(--card-shadow);transition:all 0.3s var(--ease-bounce)}
.brand-tag:hover{transform:translateY(-2px);box-shadow:var(--card-shadow-hover);color:var(--r-orange)}
.audience-section{margin-top:48px;text-align:center}
.audience-row{display:flex;gap:20px;justify-content:center;flex-wrap:wrap}
.audience-chip{padding:10px 20px;background:var(--peach);border-radius:var(--radius-full);font-size:0.85rem;color:var(--text-primary);font-weight:500}
.contact-grid{display:grid;grid-template-columns:1fr 1fr;gap:32px;align-items:start}
.contact-card{background:var(--card-bg);border-radius:var(--radius-lg);padding:32px;box-shadow:var(--card-shadow)}
.contact-card h3{font-family:var(--font-display);font-size:1.1rem;color:var(--text-primary);margin-bottom:20px}
.contact-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid rgba(0,0,0,0.03);font-size:0.9rem;color:var(--text-secondary)}
.contact-item:last-child{border-bottom:none}
.contact-item-icon{font-size:1.2rem}
.contact-item a{color:var(--r-orange);text-decoration:none;font-weight:500}
.contact-item a:hover{text-decoration:underline}
.social-links{display:flex;flex-wrap:wrap;gap:8px;margin-top:20px}
.social-link{display:flex;align-items:center;gap:8px;padding:12px 20px;background:var(--card-bg);border-radius:var(--radius-full);text-decoration:none;color:var(--text-primary);font-size:0.9rem;font-weight:500;box-shadow:var(--card-shadow);transition:all 0.3s var(--ease-bounce)}
.social-link:hover{transform:translateY(-3px);box-shadow:var(--card-shadow-hover)}
.social-link-icon{font-size:1.2rem}
.collab-note{text-align:center;margin-top:32px;padding:20px;background:var(--peach);border-radius:var(--radius-md);font-size:0.9rem;color:var(--text-secondary)}
.footer{text-align:center;padding:48px 20px;color:var(--text-muted);font-size:0.8rem}
.footer-rainbow{width:100%;height:3px;background:linear-gradient(90deg,var(--r-red),var(--r-orange),var(--r-yellow),var(--r-green),var(--r-blue),var(--r-purple),var(--r-pink));margin-bottom:32px;border-radius:2px}
.footer-heart{color:var(--r-pink);display:inline-block;animation:heartBeat 1.5s ease-in-out infinite}
@keyframes heartBeat{0%,100%{transform:scale(1)}15%{transform:scale(1.25)}30%{transform:scale(1)}}
.reveal{opacity:0;transform:translateY(30px);transition:opacity 0.7s var(--ease-smooth),transform 0.7s var(--ease-smooth)}
.reveal.visible{opacity:1;transform:translateY(0)}
.reveal-d1{transition-delay:0.05s}.reveal-d2{transition-delay:0.1s}.reveal-d3{transition-delay:0.15s}.reveal-d4{transition-delay:0.2s}.reveal-d5{transition-delay:0.25s}
@media(max-width:768px){
  .nav-links{position:fixed;top:0;right:0;width:260px;height:100vh;flex-direction:column;justify-content:center;align-items:center;gap:32px;background:rgba(255,251,245,0.97);backdrop-filter:blur(30px);-webkit-backdrop-filter:blur(30px);transform:translateX(100%);transition:transform 0.4s var(--ease-smooth);box-shadow:-1px 0 0 rgba(0,0,0,0.04)}
  .nav-links.active{transform:translateX(0)}
  .nav-toggle{display:flex}
  .contact-grid{grid-template-columns:1fr}
  .lookbook-grid{grid-template-columns:repeat(auto-fill,minmax(160px,1fr))}
  .travel-grid{grid-template-columns:1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
}
@media(max-width:480px){
  .section{padding:64px 16px}
  .lookbook-grid{grid-template-columns:repeat(2,1fr);gap:12px}
  .stats-grid{grid-template-columns:1fr}
  .hero-stats-row{gap:12px}
}
</style>
</head>
